line-length = 100
target-version = "py314"

[lint]
select = [
    "E",
    "F",
    "W",
    "I",
    "N",
    "UP",
    "B",
    "A",
    "C4",
    "SIM",
    "RUF",
]
ignore = [
    "E501",
    # Codebase comments/docstrings are bilingual (Russian); Cyrillic letters
    # that visually resemble Latin are intentional, not typos.
    "RUF001",
    "RUF002",
    "RUF003",
]

[lint.per-file-ignores]
"tests/**" = ["S101"]
