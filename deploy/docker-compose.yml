services:
  keenyspace:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    # Optional local overrides + secrets (gitignored). Any KEENYSPACE_* var here
    # (e.g. KEENYSPACE_COMPILE__MAX_OUTPUT_TOKENS for model-specific output caps)
    # is injected into the container. Lower precedence than `environment:` below.
    env_file:
      - path: .env
        required: false
    environment:
      KEENYSPACE_DB__URL: postgresql+asyncpg://keenyspace:${POSTGRES_PASSWORD:-devpw}@postgres/keenyspace
      KEENYSPACE_FS__ROOT: /var/lib/keenyspace
      # OIDC contract — Authentik wired in this branch (DEP-06 pulled forward for Phase 6 dogfood).
      # client_id MUST match the CLI device-flow client (keenyspace-cli) so token aud validates.
      # Split-horizon issuer: clients + token `iss` use the public URL (localhost:9000 from
      # the host); the server fetches OIDC discovery + JWKS over compose DNS at authentik:9000.
      # JWKS keys are host-independent so internally-fetched keys validate publicly-issued
      # tokens. Removes the /etc/hosts dev hack for dogfood login.
      # See Phase 3.1 D-24 (split-horizon issuer activation).
      KEENYSPACE_AUTH__OIDC_ISSUER_URL: http://localhost:9000/application/o/keenyspace/
      KEENYSPACE_AUTH__OIDC_INTERNAL_ISSUER_URL: http://authentik:9000/application/o/keenyspace/
      KEENYSPACE_AUTH__OIDC_CLIENT_ID: keenyspace-cli
      KEENYSPACE_AUTH__OIDC_CLIENT_SECRET: ${KEENYSPACE_OIDC_CLIENT_SECRET:-client-secret-replace-me}
      KEENYSPACE_AUTH__OIDC_REDIRECT_URI: http://localhost:8000/v1/api/auth/callback
      KEENYSPACE_AUTH__OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:8000/
      KEENYSPACE_AUTH__SESSION_SECRET_KEY: ${KEENYSPACE_SESSION_SECRET_KEY:-session-secret-replace-me-min-32-bytes-xxxxxx}
      KEENYSPACE_AUTH__API_KEY_PEPPER: ${KEENYSPACE_API_KEY_PEPPER:-api-key-pepper-replace-me-min-32-bytes-xxxxxx}
      KEENYSPACE_AUTH__REQUIRED_GROUP: ${KEENYSPACE_AUTH__REQUIRED_GROUP:-}
      # Destructive admin backup/restore endpoints stay off by default (CR-02);
      # the backup-restore drill exports KEENYSPACE_ADMIN_API_ENABLED=1 for its run.
      KEENYSPACE_ADMIN_API_ENABLED: ${KEENYSPACE_ADMIN_API_ENABLED:-0}
      KEENYSPACE_AUTO_MIGRATE: "true"
      # Compile is provider-neutral (pydantic-ai). Anthropic stays the default
      # (D-04); override provider/model + supply the matching key via deploy/.env
      # (gitignored) for OpenAI/etc. Keys default to empty so the image is safe
      # to commit. The LLM API key for the chosen provider must be present here
      # for the server-side compile agent to run.
      KEENYSPACE_COMPILE__PROVIDER: ${KEENYSPACE_COMPILE__PROVIDER:-anthropic}
      KEENYSPACE_COMPILE__MODEL: ${KEENYSPACE_COMPILE__MODEL:-claude-sonnet-4-6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - keenyspace-fs:/var/lib/keenyspace
    depends_on:
      postgres:
        condition: service_healthy
      authentik:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  authentik-postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authentik
      POSTGRES_DB: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik-db-password-replace-me}
    volumes:
      - authentik-postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d authentik -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  authentik-redis:
    image: redis:alpine
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  authentik:
    image: ghcr.io/goauthentik/server:2026.2
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik-db-password-replace-me}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-authentik-secret-key-replace-me-50-bytes-padding-padding-padding}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-authentik-admin-replace-me}
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@keenyspace.local
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-authentik-bootstrap-token-replace-me-32-bytes-padding}
    volumes:
      - authentik-media:/data/media
      - authentik-templates:/templates
      # branding assets live inside ./authentik/blueprints/branding — a nested
      # bind into the :ro blueprints mount fails (read-only parent), so the
      # single blueprints mount carries them.
      - ./authentik/blueprints:/blueprints/custom:ro
      # Same assets served as media so the brand can reference them. Files land
      # at /data/media/public/keeny/<name>; the branding FileField storage is
      # rooted at media/public/, so brand values are relative to that (keeny/<name>)
      # and the serializer prepends public/ itself. The validator rejects leading
      # slashes / absolute paths, so values stay relative under MEDIA_ROOT.
      - ./authentik/blueprints/branding:/data/media/public/keeny:ro
    ports:
      - "9000:9000"
      - "9443:9443"
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    restart: unless-stopped

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik-db-password-replace-me}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-authentik-secret-key-replace-me-50-bytes-padding-padding-padding}
    volumes:
      - authentik-media:/data/media
      - authentik-templates:/templates
      - authentik-certs:/certs
      - ./authentik/blueprints:/blueprints/custom:ro
      # Worker applies blueprints; mount branding into media here too so the
      # referenced files exist when the brand entry is validated/applied.
      - ./authentik/blueprints/branding:/data/media/public/keeny:ro
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17.2-alpine
    environment:
      POSTGRES_DB: keenyspace
      POSTGRES_USER: keenyspace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpw}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keenyspace -d keenyspace"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost:80}
    depends_on:
      keenyspace:
        condition: service_healthy
    restart: unless-stopped

  test:
    profiles: ["test"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.test-linux
    environment:
      KEENYSPACE_DB__URL: postgresql+asyncpg://keenyspace:devpw@postgres/keenyspace
      KEENYSPACE_FS__ROOT: /tmp/keenyspace
      # OIDC contract — test profile uses placeholders; tests inject pytest-httpserver-backed values.
      KEENYSPACE_AUTH__OIDC_ISSUER_URL: http://authentik:9000/application/o/keenyspace/
      KEENYSPACE_AUTH__OIDC_CLIENT_ID: keenyspace-test
      KEENYSPACE_AUTH__OIDC_CLIENT_SECRET: test-client-secret
      KEENYSPACE_AUTH__OIDC_REDIRECT_URI: http://localhost:8000/v1/api/auth/callback
      KEENYSPACE_AUTH__OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:8000/
      KEENYSPACE_AUTH__SESSION_SECRET_KEY: test-session-secret-min-32-bytes-padding-padding
      KEENYSPACE_AUTH__API_KEY_PEPPER: test-api-key-pepper-min-32-bytes-padding-padding
      KEENYSPACE_AUTO_MIGRATE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uv", "run", "--package", "keenyspace-server", "pytest", "packages/server/tests/", "-v"]

volumes:
  keenyspace-fs:
  postgres-data:
  authentik-postgresql:
  authentik-redis:
  authentik-media:
  authentik-templates:
  authentik-certs:
  caddy-data:
  caddy-config:
