name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-packages --all-extras
      - name: ruff check
        run: uv run ruff check .
      - name: mypy
        run: |
          uv run mypy --strict \
            packages/server/keenyspace_server \
            packages/client/keenyspace

  test-server:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.2-alpine
        env:
          POSTGRES_DB: keenyspace_test
          POSTGRES_USER: keenyspace
          POSTGRES_PASSWORD: testpw
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      KEENYSPACE_DB__URL: postgresql+asyncpg://keenyspace:testpw@localhost:5432/keenyspace_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-packages --all-extras
      - name: Install PostgreSQL 17 client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
      - name: pytest server
        working-directory: packages/server
        run: uv run --package keenyspace-server pytest tests/ -x -q -m "not real_idp"

  test-client:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-packages --all-extras
      - name: pytest client
        run: uv run --package keenyspace pytest packages/client/tests/ -x -q
