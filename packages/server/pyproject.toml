[build-system]
requires = ["uv_build>=0.11.7,<0.12"]
build-backend = "uv_build"

[project]
name = "keenyspace-server"
version = "0.1.0"
requires-python = ">=3.14,<3.15"
dependencies = [
    "fastapi~=0.128",
    "uvicorn[standard]>=0.32",
    "fastmcp~=3.2",
    "pydantic>=2.13",
    "pydantic-settings~=2.14",
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.31",
    "alembic>=1.14",
    "structlog>=24.4",
    "prometheus-client>=0.21",
    "prometheus-fastapi-instrumentator>=7.0,<8.0",
    "python-ulid~=3.1",
    "httpx>=0.28",
    "pyyaml>=6.0.2",
    "jinja2>=3.1,<4.0",
    "keenyspace-shared",
    "pydantic-ai-slim[anthropic,openai]>=1.0,<2.0",
    "instructor~=1.14",
    "apscheduler>=3.10,<4.0",
    "itsdangerous>=2.2,<3.0",
    "argon2-cffi>=25.1,<26.0",
    "semver>=3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
    "pytest-timeout>=2.3",
    "anyio[trio]>=4.0",
    "ruff>=0.9",
    "mypy>=1.14",
    "types-pyyaml>=6.0",
    "respx>=0.21",
    "pytest-httpx>=0.35",
    "pytest-httpserver>=1.1,<2.0",
    "freezegun>=1.5,<2.0",
    "testcontainers>=4.14,<5.0",
]

[project.scripts]
keenyspace-server = "keenyspace_server.main:cli_main"

[tool.uv.build-backend]
module-name = "keenyspace_server"
module-root = ""

[tool.mypy]
strict = true

[[tool.mypy.overrides]]
module = ["apscheduler.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["keenyspace_shared.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["joserfc.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["testcontainers.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-m 'not real_idp'"
markers = [
    "real_idp: requires a live Authentik instance via testcontainers; slow (~90s startup)",
]

